name: restock
description: "The Restock Official App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_custom_tabs: ^2.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage: ^10.3.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  lottie: ^3.3.3
  path: ^1.9.1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/restock_icon.svg

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/restock_splash.json