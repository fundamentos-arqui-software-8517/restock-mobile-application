name: restock
description: "The Restock Official App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_secure_storage: ^10.3.0
  get_it: ^9.2.1
  go_router: ^17.2.3
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  lottie: ^3.3.3
  path: ^1.9.1
  sqflite: ^2.4.2+1
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/restock-mobile-logo.png
  adaptive_icon_background: "#151C2A"
  adaptive_icon_foreground: assets/icon/restock-mobile-logo.png

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/lottie/restock_splash.json
    - assets/icon/restock-mobile-logo.png
    - assets/notifications/
